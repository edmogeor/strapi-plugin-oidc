name: Release

on:
  push:
    tags:
      - 'v*' # Trigger on version tags, e.g., v1.0.0
      - '[0-9]+.[0-9]+.[0-9]+*' # Trigger on semantic version tags without v prefix

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies in root
        run: npm ci || npm install

      - name: Build plugin
        run: npm run build

      - name: Install dependencies in test-app
        run: |
          cd test-app
          npm ci || npm install
          npm run build

      - name: Run E2E Tests
        run: npm run test

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to create GitHub Release
      id-token: write # Needed for NPM provenance (Trusted Publisher)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required to extract changelog history

      - name: Extract release notes
        id: extract_release_notes
        uses: ffurrer2/extract-release-notes@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Update package.json version and commit
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version $VERSION --allow-same-version --no-git-tag-version
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git commit -am "chore(release): bump version to ${VERSION} [skip ci]" || echo "No changes to commit"
          git push origin HEAD:main || echo "Could not push to main"

      - name: Update npm for trusted publishing support
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build plugin
        run: npm run build

      - name: Publish to NPM with Provenance
        run: npm publish --provenance --access public

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.extract_release_notes.outputs.release_notes }}
          # The release tag name is automatically taken from the triggered github ref
